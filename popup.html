<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gmail Unsubscriber Ondevice</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-root">
      <h1 class="popup-title">Gmail Unsubscriber Ondevice</h1>

      <label class="toggle-row" for="show-extension">
        <input id="show-extension" type="checkbox" />
        <span>Show the extension</span>
      </label>

      <section class="shortcut-settings">
        <h2>Execute Selected Shortcut</h2>
        <label class="toggle-row" for="shortcut-enabled">
          <input id="shortcut-enabled" type="checkbox" />
          <span>Enable keyboard shortcut in Gmail</span>
        </label>
        <div class="shortcut-grid">
          <label for="shortcut-key">Key</label>
          <input id="shortcut-key" type="text" maxlength="1" placeholder="E" />
          <label class="shortcut-check" for="shortcut-alt">
            <input id="shortcut-alt" type="checkbox" />
            <span>Alt</span>
          </label>
          <label class="shortcut-check" for="shortcut-shift">
            <input id="shortcut-shift" type="checkbox" />
            <span>Shift</span>
          </label>
          <label class="shortcut-check" for="shortcut-ctrl">
            <input id="shortcut-ctrl" type="checkbox" />
            <span>Ctrl</span>
          </label>
          <label class="shortcut-check" for="shortcut-meta">
            <input id="shortcut-meta" type="checkbox" />
            <span>Cmd/Win</span>
          </label>
        </div>
        <p class="shortcut-hint" id="shortcut-preview"></p>
      </section>

      <section class="about">
        <h2>About</h2>
        <p>Helps you clean your Gmail inbox faster using Gmail-native actions.</p>
        <p>Disclaimer: The Cleaner sidebar appears only when Gmail is open at mail.google.com.</p>
        <p><a class="support-link" href="https://buymeacoffee.com/mathewvarghese" target="_blank" rel="noopener noreferrer">support me</a></p>
        <p>Made with ❤️ and lots of ☕ by Mathew Varghese</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
